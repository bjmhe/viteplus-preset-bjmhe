name: Autofix

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix-autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@6
        with:
          persist-credentials: false
          fetch-depth: "1"

      - name: Setup Vite Plus
        uses: sxzz/workflows/setup-vp@main
        with:
          node-version: 24

      - name: Fix
        run: vp check --fix && vp run build --update-snapshot

      - name: Commit
        uses: autofix-ci/action@v1
        with:
          fail-fast: false
